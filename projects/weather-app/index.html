<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App | Akele Coder</title>
  <meta name="description" content="Real-time weather for any city. Built by Aakash Kumar Sahu (AkeleCoder)." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Back to portfolio -->
  <a href="../../index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
      <path d="M11 7H3M6 4L3 7l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Portfolio
  </a>

  <main class="page">

    <!-- Page header -->
    <header class="page-header">
      <span class="page-tag">Live Data</span>
      <h1 class="page-title">Weather</h1>
      <p class="page-sub">Real-time conditions for any city.</p>
    </header>

    <!-- Search row -->
    <div class="search-row">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <input
          id="city"
          type="text"
          placeholder="Enter city — e.g. Raipur, Delhi…"
          autocomplete="off"
          aria-label="City name"
        />
      </div>
      <button
        id="search-btn"
        class="btn-search"
        aria-label="Search weather"
        onclick="getWeather()"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Quick city buttons -->
    <div class="quick-cities" role="group" aria-label="Quick city shortcuts">
      <span class="quick-label">Quick:</span>
      <button class="quick-btn" data-city="Bhilai,Chhattisgarh">Bhilai</button>
      <button class="quick-btn" data-city="Raipur,Chhattisgarh">Raipur</button>
      <button class="quick-btn" data-city="Delhi,India">Delhi</button>
      <button class="quick-btn" data-city="Mumbai,Maharashtra">Mumbai</button>
      <button class="quick-btn" data-city="Bangalore,Karnataka">Bangalore</button>
    </div>

    <!-- Weather result card — hidden until JS populates it -->
    <div
      id="weather"
      class="weather-card"
      style="display: none;"
      aria-live="polite"
      aria-atomic="true"
    >
      <!-- Populated by renderWeather() in script.js -->
    </div>

    <!-- Loading indicator -->
    <div id="loading" class="loading" style="display: none;" aria-live="polite">
      <div class="loading-dots" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <p>Fetching weather…</p>
    </div>

    <!-- Error message -->
    <div id="error-msg" class="error-msg" style="display: none;" role="alert"></div>

    <!-- Attribution -->
    <p class="api-note">
      Powered by <a href="https://www.weatherapi.com/" target="_blank" rel="noopener noreferrer">WeatherAPI</a>.
    </p>

  </main>

  <script src="script.js"></script>
</body>
</html>
