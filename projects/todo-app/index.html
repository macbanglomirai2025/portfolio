<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App | Akele Coder</title>
  <meta name="description" content="A clean todo app built by Aakash Kumar Sahu (AkeleCoder)." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Back to portfolio -->
  <a href="../../index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
      <path d="M11 7H3M6 4L3 7l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Portfolio
  </a>

  <main class="page">

    <!-- Page header -->
    <header class="page-header">
      <span class="page-tag">Productivity</span>
      <h1 class="page-title">My Tasks</h1>
      <p class="page-sub">Stay focused. Ship things.</p>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar" aria-label="Task statistics">
      <div class="stat-chip">
        <span id="count-total">0</span> total
      </div>
      <div class="stat-chip accent">
        <span id="count-active">0</span> remaining
      </div>
      <div class="stat-chip">
        <span id="count-done">0</span> done
      </div>
    </div>

    <!-- Add task input -->
    <div class="input-row">
      <label for="task" class="sr-only">New task</label>
      <input
        id="task"
        type="text"
        placeholder="What needs to be done?"
        autocomplete="off"
        maxlength="120"
        aria-label="New task"
      />
      <button id="add-btn" class="btn-add" aria-label="Add task">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path d="M12 5v14M5 12h14" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs" role="tablist" aria-label="Filter tasks">
      <button class="tab active" data-filter="all"       role="tab" aria-selected="true">All</button>
      <button class="tab"        data-filter="active"    role="tab" aria-selected="false">Active</button>
      <button class="tab"        data-filter="completed" role="tab" aria-selected="false">Completed</button>
    </div>

    <!-- Task list -->
    <ul id="list" class="todo-list" aria-label="Task list" aria-live="polite">
      <!-- Empty state shown by JS -->
      <li class="empty-state" id="empty-state" aria-hidden="false">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        <p>No tasks yet. Add something above!</p>
      </li>
    </ul>

    <!-- Footer actions -->
    <div class="footer-actions">
      <button id="clear-completed" class="btn-clear" aria-label="Clear all completed tasks">
        Clear completed
      </button>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
